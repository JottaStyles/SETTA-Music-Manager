<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SETTA - Iniciar sesion</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/setta.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .auth-card {
            background: var(--gris-osc);
            border: 1px solid var(--borde);
            padding: 2.5rem 2rem;
            width: 100%;
            max-width: 390px;
        }
        .auth-logo {
            font-family: var(--font-title);
            font-size: 1.8rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-bottom: 0.2rem;
        }
        .auth-subtitulo {
            font-family: var(--font-mono);
            font-size: 0.68rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 2rem;
        }
        .form-label-setta {
            font-family: var(--font-mono);
            font-size: 0.68rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--gris-cla);
            display: block;
            margin-bottom: 0.35rem;
        }
        .auth-link {
            text-align: center;
            font-size: 0.82rem;
            color: var(--muted);
            margin-top: 1rem;
        }
        .auth-link a {
            color: var(--gris-cla);
            text-decoration: none;
        }
        .auth-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>

<div class="auth-card">
    <div class="auth-logo">SETTA</div>
    <div class="auth-subtitulo">Iniciar sesion</div>

    <div class="mb-3">
        <label class="form-label-setta">Correo</label>
        <input class="input-setta" type="email" id="correo" placeholder="tu@correo.com">
    </div>

    <div class="mb-4">
        <label class="form-label-setta">Contrasena</label>
        <input class="input-setta" type="password" id="pass" placeholder="••••••••">
    </div>

    <button class="btn-setta primario w-100" onclick="hacerLogin()">Entrar</button>

    <div class="auth-link">
        No tenes cuenta? <a href="register.html">Registrate</a>
    </div>
    <div class="auth-link mt-1">
        <a href="index.html" style="color:#555">Volver al inicio</a>
    </div>
</div>

<script src="js/api.js"></script>
<script>
    async function hacerLogin() {
        const c = document.getElementById("correo").value.trim();
        const p = document.getElementById("pass").value.trim();
        if (!c || !p) {
            alert("Completa todos los campos");
            return;
        }

        try {
            const respuesta = await iniciarSesion(c, p);
            // Guardamos el usuario en localStorage para usarlo en la app.
            localStorage.setItem('setta_usuario', JSON.stringify(respuesta.user));
            window.location = "app.html";
        } catch (error) {
            alert(error.message);
        }
    }
</script>

</body>
</html>
