<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SETTA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/setta.css" rel="stylesheet">
    <style>
        /* estilos especificos de landing */
        body { overflow-x: hidden; }

        .landing-wrap {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .hero {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 80px 20px 60px;
            position: relative;
        }

        /* patron de fondo sutil */
        .hero::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(rgba(200,201,190,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(200,201,190,0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
        }

        .hero-eyebrow {
            font-family: var(--font-mono);
            font-size: 1.60rem;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: var(--gris-med);
            margin-bottom: 1.5rem;
        }

        .hero-titulo {
            font-family: var(--font-title);
            font-size: clamp(15rem, 13vw, 9rem);
            font-weight: 900;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            line-height: 1;
            color: var(--blanco);
            margin-bottom: 1rem;
        }

        .hero-desc {
            max-width: 600px;
            color: var(--gris-cla);
            font-size: 1.60rem;
            line-height: 1.7;
            margin-bottom: 2.5rem;
        }

        .hero-acciones {
            display: flex;
            gap: 3rem;
            justify-content: center;
            flex-wrap: wrap;
            position: relative;
            z-index: 1;
        }

        /* barra de features abajo */
        .features-bar {
            background: var(--gris-osc);
            border-top: 1px solid var(--borde);
        }

        .feature-col {
            padding: 2rem 1rem;
            border-right: 1px solid var(--borde);
            text-align: center;
        }
        .feature-col:last-child { border-right: none; }

        .feature-num {
            font-family: var(--font-title);
            font-size: 1.5rem;
            font-weight: 900;
            color: var(--blanco);
        }
        .feature-lbl {
            font-family: var(--font-mono);
            font-size: 0.68rem;
            color: var(--muted);
            margin-top: 0.25rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        nav.top {
            background: var(--gris-osc);
            border-bottom: 1px solid var(--borde);
            padding: 0 2rem;
            height: 52px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
    </style>
</head>
<body>

<div class="landing-wrap">

    <!-- navbar -->
    <nav class="top">
        <span class="navbar-logo"></span>
        <div class="d-flex gap-2">
            <button class="btn-setta secundario" onclick="window.location='login.html'">Iniciar sesion</button>
            <button class="btn-setta primario"   onclick="window.location='register.html'">Registrarse</button>
        </div>
    </nav>

    <!-- hero -->
    <div class="hero">
        <div class="hero-eyebrow">Herramienta para DJ principiantes</div>
        <h1 class="hero-titulo">SETTA</h1>
        <p class="hero-desc">
            Encontra canciones compatibles, descubri transiciones faciles
            y construi sets que suenan bien. Filtra por BPM, genero y energia.
        </p>
        <div class="hero-acciones">
            <button class="btn-setta primario" onclick="window.location='register.html'">Empezar gratis</button>
            <button class="btn-setta secundario" onclick="window.location='login.html'">Ya tengo cuenta</button>
        </div>
    </div>

    <!-- features -->
    <div class="features-bar">
        <div class="container-fluid px-0">
            <div class="row g-0">
                <div class="col-3 feature-col">
                    <div class="feature-num">BPM</div>
                    <div class="feature-lbl">Filtro por beats por minuto</div>
                </div>  
                <div class="col-3 feature-col">
                    <div class="feature-num">Match</div>
                    <div class="feature-lbl">Compatibilidad automatica</div>
                </div>
                <div class="col-3 feature-col">
                    <div class="feature-num">Sets</div>
                    <div class="feature-lbl">Construi y guarda tus mezclas</div>
                </div>
                <div class="col-3 feature-col">
                    <div class="feature-num">Tips</div>
                    <div class="feature-lbl">Consejos para mejorar</div>
                </div>
            </div>
        </div>
    </div>

</div>

</body>
</html>
